// ── Helpers REST sobre Supabase ───────────────────────────────────────────────
const SB_HEADERS = {
  "apikey": SUPABASE_ANON,
  "Authorization": `Bearer ${SUPABASE_ANON}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbSelect(table, filters = "") {
  const url = `${SUPABASE_URL}/rest/v1/${table}?select=*${filters ? "&" + filters : ""}`;
  const r = await fetch(url, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(`sbSelect ${table}: ${r.status}`);
  return r.json();
}

async function sbUpsert(table, rows) {
  const url = `${SUPABASE_URL}/rest/v1/${table}`;
  const r = await fetch(url, {
    method: "POST",
    headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates,return=representation" },
    body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
  });
  if (!r.ok) { const e = await r.text(); throw new Error(`sbUpsert ${table}: ${e}`); }
  return r.json();
}

async function sbDelete(table, id) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`;
  const r = await fetch(url, { method: "DELETE", headers: SB_HEADERS });
  if (!r.ok) throw new Error(`sbDelete ${table}: ${r.status}`);
}

// ── Persistencia granular (se llama desde setState) ───────────────────────────
// Guardamos el estado previo para detectar diff y solo upsert lo que cambió
let _prevState = null;
async function syncStateToSupabase(state, userId) {
  if (!userId) return;
  const prev = _prevState;
  _prevState = state;
  if (!prev) return; // primera vez — los datos ya vienen de Supabase

  const upsertIfChanged = async (key, toSB, table) => {
    if (state[key] === prev[key]) return;
    const prevIds = new Set((prev[key] || []).map(x => x.id));
    const currIds = new Set((state[key] || []).map(x => x.id));
    // Upsert nuevos/modificados
    const toUpsert = (state[key] || []).filter(x => {
      if (!prevIds.has(x.id)) return true; // nuevo
      const p = prev[key].find(p => p.id === x.id);
      return JSON.stringify(p) !== JSON.stringify(x); // modificado
    });
    // Eliminar los que ya no están
    const toRemove = (prev[key] || []).filter(x => !currIds.has(x.id));
    if (toUpsert.length) await sbUpsert(table, toUpsert.map(x => toSB(x, userId))).catch(console.error);
    for (const x of toRemove) await sbDelete(table, x.id).catch(console.error);
  };

  await Promise.all([
    upsertIfChanged("transactions", txToSB,      "transacciones"),
    upsertIfChanged("accounts",     accToSB,     "cuentas"),
    upsertIfChanged("budgets",      budgetToSB,  "presupuestos"),
    upsertIfChanged("goals",        goalToSB,    "metas"),
    upsertIfChanged("estimates",    estToSB,     "estimaciones"),
    upsertIfChanged("debts",        debtToSB,    "deudas"),
    upsertIfChanged("rules",        ruleToSB,    "reglas"),
    upsertIfChanged("cats",         catToSB,     "categorias"),
  ]);
}
